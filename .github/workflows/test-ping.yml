name: Test Ping

# Manual-only: posts a test message to the top-companies channel so you can
# check phone notifications. Trigger from the Actions tab or via API.
on:
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Post test message
        env:
          HOOK: ${{ secrets.DISCORD_WEBHOOK_URL_TOP }}
        run: |
          curl -sf -X POST -H "Content-Type: application/json" \
            -d '{"content":"👋 hi — test message from the internship watcher. If your phone buzzed, notifications are set up right."}' \
            "$HOOK"
